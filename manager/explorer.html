<html>
	<head>
		<title>Explorer</title>
		<meta charset="utf-8">
		<meta http-equiv="Expires" content="0">
		<meta http-equiv="Pragma" content="no-cache">
		<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
		<script src="https://code.jquery.com/jquery.min.js"></script>
		<style>
			body{
				margin: 0;
				font-family: "Segoe UI", "Noto Sans TC", sans-serif;
				background: #f6f8fb;
				color: #1f2a37;
			}
			.page-wrap{
				width: min(1080px, 94%);
				margin: 18px auto 28px;
			}
			.top-nav{
				position: sticky;
				top: 0;
				z-index: 9999;
				background: #ffffff;
				border-bottom: 1px solid #dbe3f2;
				padding: 12px 14px;
			}
			.home-banner{
				display: block;
				padding: 12px 14px;
				border-radius: 10px;
				border: 1px solid #cbd5e1;
				background: #eef5ff;
				color: #1f2a37;
				font-size: 30px;
				text-decoration: none;
				font-weight: 600;
				letter-spacing: 0.2px;
			}
			.dir{
				display: inline-block;
				width: calc(100% - 120px);
				min-width: 0;
				background: #FFDD88;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}
			.dir:hover{
				background: #FFCC33;
			}
			.file{
				display: inline-block;
				width: calc(100% - 120px);
				min-width: 0;
				background: #B3D1E7;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}
			.file:hover{
				background: #336699;
			}
			#view > iframe{
				width: 100%;
				height: 100%;
			}
			#edit > textarea{
				width: 100%;
				height: 100%;
			}
			#drop{
				position: relative;
				border: 2px dashed #ccc;
				background-color: rgba(255, 255, 255);
				min-height: 50px
			}
			#drop.cover{
				border: 2px dashed #000;
				background-color: rgba(200, 200, 200);
			}
			.toolbar-card,
			.content-card{
				background: #fff;
				border: 1px solid #dbe3f2;
				border-radius: 12px;
				padding: 12px;
				margin-bottom: 12px;
			}
			.content-card{
				display: block;
			}
			.content-card > #list,
			.content-card > #view,
			.content-card > #edit{
				background: #fff;
				border: 1px solid #e4ebf7;
				border-radius: 10px;
				padding: 10px;
				margin-bottom: 10px;
			}
		</style>
	</head>
	<body onload="read(getStartupPath())">
		<div class="top-nav">
			<a class="home-banner" href="/manager/index.html">Explorer</a>
		</div>
		<main class="page-wrap">
		
		<div class="toolbar-card">
			<button onclick="pathBack(currentPath)"> 上一頁 </button>
			<button onclick="resetExplorer()">重置</button>
			<label> DIR: </label> 
			<input id="path" type="text" oninput="read(this.value)"/> 
			<button onclick="read(currentPath+'/..')"> .. </button>
			<button onclick="download(currentPath)">下載當前項目</button>
		</div>
		
		<div class="content-card">
			<div id="list">
				<button onclick="create(currentPath, 'dir')"> + 新資料夾</button>
				<button onclick="create(currentPath, 'file')"> + 新文件</button>
				<br/>
				<ul id="drop" draggable="true"></ul>
			</div>
			<div id="view">
				<button onclick="edit(currentPath)">編輯</button>
				<br/>
				<iframe id="frame"></iframe>
			</div>
			<div id="edit">
				<button onclick="save(currentPath)">儲存</button>
				<button onclick="read(currentPath)">取消</button>
				<br/>
				<textarea></textarea>
			</div>
		</div>
		</main>
		
		<form id="download" method="GET">
			<input name="path" type="hidden">
		</form>
		
		<template id="item">
			<li width="100%" path="replace with file path">
				<span>[文件名稱]</span>
				<button onclick="rename(this.parentNode.path, this.parentNode.type)">更名</button>
				<button onclick="remove(this.parentNode.path, this.parentNode.type)">刪除</button>
			</li>
		</template>
		
		<script>
			// global varable
			let currentPath = "/";
						
			// api
			let typeApi = 		"/manager/api/site/get_path_type.php" //?path
			let dirScanApi 	= 	"/manager/api/dir/scan_dir.php" //?dir
			let dirCreateApi = 	"/manager/api/dir/create_dir.php" //?dir
			let dirDeleteApi = 	"/manager/api/dir/delete_dir.php" //?path
			let dirRenameApi = 	"/manager/api/dir/rename_dir.php" //?path, name
			let dirDownloadApi = "/manager/api/dir/download_dir.php" //?path
			let fileScanApi = 	"/manager/api/file/scan_file.php" //?dir
			let fileReadApi = 	"/manager/api/file/read_file.php" //?path
			let fileWriteApi = 	"/manager/api/file/write_file.php" //?path, content
			let fileCreateApi = "/manager/api/file/create_file.php" //?dir
			let fileDeleteApi = "/manager/api/file/delete_file.php" //?path
			let fileRenameApi = "/manager/api/file/rename_file.php" //?path, name
			let fileDownloadApi = "/manager/api/file/download_file.php" //?path
			let fileUploadsApi = "/manager/api/file/upload_files.php" //?path
			const EXPLORER_PATH_COOKIE = 'manager_explorer_path_v1';

			function normalizePath(path){
				const raw = String(path ?? '').replace(/\\/g, '/');
				const parts = [];
				raw.split('/').forEach((seg) => {
					if (!seg || seg === '.') return;
					if (seg === '..') {
						if (parts.length > 0) parts.pop();
						return;
					}
					parts.push(seg);
				});
				return '/' + parts.join('/');
			}
			function joinPath(base, name){
				return normalizePath(`${base}/${name}`);
			}
			function escapeHtml(text){
				return String(text)
					.replaceAll('&', '&amp;')
					.replaceAll('<', '&lt;')
					.replaceAll('>', '&gt;')
					.replaceAll('"', '&quot;')
					.replaceAll("'", '&#39;');
			}
			function setCookie(name, value, days = 30){
				const d = new Date();
				d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
				document.cookie = `${name}=${encodeURIComponent(value)}; expires=${d.toUTCString()}; path=/; SameSite=Lax`;
			}
			function deleteCookie(name){
				document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; SameSite=Lax`;
			}
			function getCookie(name){
				const key = `${name}=`;
				const arr = document.cookie.split(';');
				for (const raw of arr){
					const c = raw.trim();
					if (c.startsWith(key)) return decodeURIComponent(c.substring(key.length));
				}
				return '';
			}
			function saveCurrentPath(path){
				setCookie(EXPLORER_PATH_COOKIE, normalizePath(path));
			}
			function getStartupPath(){
				const saved = getCookie(EXPLORER_PATH_COOKIE);
				return saved ? normalizePath(saved) : '/';
			}
			function resetExplorer(){
				deleteCookie(EXPLORER_PATH_COOKIE);
				read('/');
			}
			
			function initialPath(){
				let filePath = window.location.pathname;
				let dirPath = filePath.substring(0, filePath.lastIndexOf('/'));
				return dirPath
			}

			function initialDrop(){
				let dropDom = $('#drop')
				dropDom.on("dragover", e => {
					e.preventDefault();
					dropDom.addClass('cover')
				});
				dropDom.on("dragleave", e => {
					e.preventDefault();
					e.preventDefault();
					dropDom.removeClass('cover')
				});
				dropDom.on("drop", e => {
					e.preventDefault();
					e.preventDefault();
					dropDom.removeClass('cover')
					drop(e.originalEvent.dataTransfer.items)
				});
			}
			
			function pathBack(path){
				splits = path.split('/')
				if(splits.length > 1){
					splits.pop()
					path = splits.join('/')
					read(path)
				}
			}
			
			function extractEmpty(path){
				tokens = path.split('/')
				buffer = tokens.pop()
				
				tokens = tokens.filter(t => t != '')
				tokens.push(buffer)
				
				return tokens.join('/')
			}
			
			function extractDotDot(path){
				buffer = []
				tokens = path.split('/')
				tokens.forEach(token => {
					if(token == '..' && buffer.length > 0 && buffer[buffer.length-1] != '..'){
						buffer.pop()
					}else{
						buffer.push(token)
					}
				})
				return buffer.join('/')
			}
			function alwaysHaveRoot(path){
				return path[0] == "/" 
					? path 
					: '/'+path
			}
			
			async function read(path){
				let pathDom = $('#path')
				let listDom = $('#list')
				let viewDom = $('#view')
				let editDom = $('#edit')
				
				path = normalizePath(path)
				currentPath = path
				saveCurrentPath(path)
				pathDom.val(path)
				console.log(path)
				
				let type = await $.post(typeApi, {path: path})
				switch(type){
					case 'dir':
						readDir(path)
						listDom.show()
						viewDom.hide()
						editDom.hide()
						break;
					case 'file':
						readFile(path)
						viewDom.show()
						listDom.hide()
						editDom.hide()
						break;
				}
			}
			
			function readDir(path){
				let listDom = $('#list').find('ul')
				let itemTemplate = $('#item')
				
				$.when(
					$.post(dirScanApi, {path: path}),
					$.post(fileScanApi, {path: path}),
				).done((resA, resB) => {
					let dirs = []
					let files = []
					try { dirs = Array.isArray(resA[0]) ? resA[0] : JSON.parse(resA[0] || '[]') } catch (e) { console.error('dir json parse fail', resA[0], e) }
					try { files = Array.isArray(resB[0]) ? resB[0] : JSON.parse(resB[0] || '[]') } catch (e) { console.error('file json parse fail', resB[0], e) }
					
					// clear
					listDom.empty()
					
					// append dirs
					dirs.forEach(dir => {
						let item = $(itemTemplate.html())
						item[0].path = joinPath(path, dir)
						item[0].type = 'dir'
						item.find('span').text(dir)
						item.find('span').addClass('dir')
						item.find('span').dblclick(() => {
							read(joinPath(path, dir));
						})
						listDom.append(item)
					})
					
					// append files
					files.forEach(file => {
						let item = $(itemTemplate.html())
						item[0].path = joinPath(path, file)
						item[0].type = 'file'
						item.find('span').text(file)
						item.find('span').addClass('file')
						item.find('span').dblclick(() => {
							read(joinPath(path, file));
						})
						listDom.append(item)
					})
				});
			}
			
			function readFile(path){
				let viewDom = $('#view').find('iframe')
				$.post(fileReadApi, { path: path })
					.done((res) => {
						const safe = escapeHtml(res ?? '');
						viewDom[0].srcdoc = `<pre style="margin:0;padding:12px;white-space:pre-wrap;word-break:break-word;font-family:ui-monospace,Consolas,'Courier New',monospace;font-size:13px;">${safe}</pre>`;
					})
					.fail((xhr) => {
						const msg = escapeHtml(xhr?.responseText || `${xhr.status} ${xhr.statusText}`);
						viewDom[0].srcdoc = `<pre style="margin:0;padding:12px;color:#b91c1c;white-space:pre-wrap;">read failed: ${msg}</pre>`;
					});
			}
			
			function edit(path){
				let listDom = $('#list')
				let viewDom = $('#view')
				let editDom = $('#edit')
				let codeDom = $('#edit').find('textarea')
				
				$.post(fileReadApi, {
					path: path
				}).done(() => {
					editDom.show()
					viewDom.hide()
					listDom.hide()
				}).done(res => {
					codeDom.val(res)
				})
			}
			
			function save(path){
				let editDom = $('#edit')
				
				if (!confirm(`確定要修改 "${path}" 的內容?`))
					return;
				
				content = editDom.find('textarea').val()
				
				$.post(fileWriteApi, {
					path: path, 
					content: content
				}).done(res => {
					read(currentPath)
				})
			}
			
			function create(path, type){
				if (!confirm(`確定要在 "${path}" 下新增?`))
					return;
				
				switch(type){
					case 'dir':
						$.post(dirCreateApi, {dir: path})
						 .done(() => read(currentPath) )
						break;
					case 'file':
						$.post(fileCreateApi, {dir: path})
						 .done(() => read(currentPath) )
						break;
				}
			}
			
			function rename(path, type){
				let name = prompt(`要將 "${path}" 取名為什麼名子?`)
				if (!name) return;
				
				switch(type){
					case 'dir':
						$.post(dirRenameApi, {path: path, name: name})
						 .done(() => read(currentPath) )
						break;
					case 'file':
						$.post(fileRenameApi, {path: path, name: name})
						 .done(() => read(currentPath) )
						break;
				}
			}
			
			function remove(path, type){
				let agree = confirm(`確定要刪除 "${path}" 嗎?`)
				if (!agree) return;
				
				switch(type){
					case 'dir':
						$.post(dirDeleteApi, {path: path})
						 .done(() => read(currentPath) )
						break;
					case 'file':
						$.post(fileDeleteApi, {path: path})
						 .done(() => read(currentPath) )
				}
			}
			
			async function download(path){
				let formDom = $('#download')
				let pathDom = formDom.find('input')
				
				let type = await $.post(typeApi, {path: path})
				switch(type){
					case 'dir':
						pathDom.val(path)
						formDom.attr('action', dirDownloadApi)
						formDom.submit()
						break;
					case 'file':
						pathDom.val(path)
						formDom.attr('action', fileDownloadApi)
						formDom.submit()
						break;
				}
			}
			
			async function drop(items){
				let agree = confirm(`確定要上傳檔案嗎?`)
				if (!agree) return;
				
				let entries = [];
				for (let i = 0; i < items.length; i++) {
					item = items[i]
					entry = item.webkitGetAsEntry()
					entries.push(entry)
				}
				
				let result = await getFiles(entries, currentPath)
				let files = result.files
				let dirs = result.dirs
				
				let formData = new FormData()
				files.forEach(file => formData.append('files[]', file))
				dirs.forEach(path => formData.append('dirs[]', path))
				
				$.ajax({
					type: 'POST',
					url: fileUploadsApi,
					data: formData,
					processData: false,
					contentType: false,
				}).done(res => {
					console.log(res);
					read(currentPath)
				})
			}
						
			async function getFiles(entries, dir = "") {
				let files = []
				let dirs = []
				for (let i = 0; i < entries.length; i++){
					entry = entries[i];
					if (entry.isFile) {
						await new Promise((resolve, reject) => {
							entry.file(file => {
								files.push(file)
								dirs.push(dir)
								resolve()
							})
						})
					} else if (entry.isDirectory) {
						await new Promise((resolve, reject) => {
							entry.createReader().readEntries(async (entries) => {
								result = await getFiles(entries, `${dir}/${entry.name}`)
								files = files.concat(result.files)
								dirs = dirs.concat(result.dirs)
								resolve()
							})
						})
					}
				}
				
				
				return {
					files: files,
					dirs: dirs,
				}
			}
			
		</script>
	</body>
</html>
