<html>
	<head>
		<title>Explorer</title>
		<meta charset="utf-8">
		<meta http-equiv="Expires" content="0">
		<meta http-equiv="Pragma" content="no-cache">
		<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
		<script src="https://code.jquery.com/jquery.min.js"></script>
		<script src="/manager/js/preview/markdown_preview.js"></script>
		<style>
			:root{
				--bg: #f2f5fb;
				--card: #ffffff;
				--line: #d7e2f3;
				--text: #1f2a37;
				--muted: #58657a;
				--primary: #1d4ed8;
				--primary-soft: #e8f0ff;
				--dir-bg: #fff4cc;
				--dir-bd: #f2d57a;
				--file-bg: #e8f2fc;
				--file-bd: #b8d2ef;
			}
			body{
				margin: 0;
				font-family: "Segoe UI", "Noto Sans TC", sans-serif;
				background: radial-gradient(1200px 500px at 20% -10%, #e9f2ff, transparent), var(--bg);
				color: var(--text);
			}
			.page-wrap{
				width: min(1080px, 94%);
				margin: 18px auto 28px;
			}
			.top-nav{
				position: sticky;
				top: 0;
				z-index: 9999;
				background: rgba(255,255,255,.92);
				backdrop-filter: blur(8px);
				border-bottom: 1px solid var(--line);
				padding: 12px 14px;
			}
			.home-banner{
				display: block;
				padding: 12px 14px;
				border-radius: 10px;
				border: 1px solid var(--line);
				background: linear-gradient(135deg, #eef5ff, #f8fbff);
				color: var(--text);
				font-size: 30px;
				text-decoration: none;
				font-weight: 600;
				letter-spacing: 0.2px;
			}
			#view > iframe{
				width: 100%;
				height: 360px;
				display: block;
				border: 1px solid var(--line);
				border-radius: 10px;
				background: #fff;
			}
			#edit > textarea{
				width: 100%;
				height: 360px;
				border: 1px solid var(--line);
				border-radius: 10px;
				padding: 10px;
				box-sizing: border-box;
				font-family: ui-monospace, Consolas, "Courier New", monospace;
			}
			#drop{
				position: relative;
				border: 2px dashed #c8d4ea;
				background: #fafdff;
				min-height: 80px;
				list-style: none;
				padding: 8px;
				margin: 8px 0 0;
				border-radius: 12px;
			}
			#drop.cover{
				border: 2px dashed var(--primary);
				background: #eaf2ff;
			}
			.toolbar-card,
			.content-card{
				background: var(--card);
				border: 1px solid var(--line);
				border-radius: 14px;
				padding: 14px;
				margin-bottom: 12px;
				box-shadow: 0 4px 18px rgba(21,42,88,.04);
			}
			.toolbar-card{
				display: grid;
				gap: 10px;
			}
			.toolbar-actions{
				display: flex;
				flex-wrap: wrap;
				gap: 8px;
			}
			.path-row{
				display: flex;
				gap: 8px;
				align-items: center;
			}
			.path-row input{
				flex: 1;
				border: 1px solid var(--line);
				border-radius: 10px;
				padding: 9px 10px;
				font-size: 14px;
			}
			.breadcrumb{
				display: flex;
				flex-wrap: wrap;
				gap: 6px;
				padding: 8px;
				border: 1px dashed var(--line);
				border-radius: 10px;
				background: #fbfdff;
			}
			.breadcrumb button{
				padding: 4px 8px;
				font-size: 12px;
				border-radius: 999px;
				background: var(--primary-soft);
				border-color: #c9dbff;
				color: #15306c;
			}
			.content-card{
				display: grid;
				gap: 10px;
			}
			.panel{
				background: #fff;
				border: 1px solid #e4ebf7;
				border-radius: 12px;
				padding: 10px;
				overflow: hidden;
			}
			button{
				border: 1px solid #c8d4ea;
				background: #fff;
				border-radius: 9px;
				padding: 7px 11px;
				cursor: pointer;
				transition: .18s ease;
			}
			button:hover{
				transform: translateY(-1px);
				border-color: #9bb4de;
				box-shadow: 0 3px 10px rgba(21,42,88,.08);
			}
			#drop li{
				display: grid;
				grid-template-columns: 1fr auto auto;
				gap: 8px;
				align-items: center;
				margin-bottom: 8px;
				padding: 8px;
				border-radius: 10px;
				border: 1px solid transparent;
			}
			#drop li:hover{
				border-color: var(--line);
				background: #fbfdff;
			}
			.item-name{
				display: inline-block;
				min-width: 0;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
				padding: 7px 9px;
				border-radius: 8px;
				border: 1px solid transparent;
			}
			.item-name.dir{
				background: var(--dir-bg);
				border-color: var(--dir-bd);
				font-weight: 600;
			}
			.item-name.file{
				background: var(--file-bg);
				border-color: var(--file-bd);
			}
			.item-name:hover{
				filter: brightness(.98);
			}
			.panel-title{
				margin: 0 0 8px;
				font-size: 14px;
				color: var(--muted);
				font-weight: 600;
			}
		</style>
	</head>
	<body onload="read(getStartupPath())">
		<div class="top-nav">
			<a class="home-banner" href="/manager/index.html">Explorer</a>
		</div>
		<main class="page-wrap">
		
		<div class="toolbar-card">
			<div class="toolbar-actions">
				<button onclick="pathBack(currentPath)">上一頁</button>
				<button onclick="read(currentPath+'/..')">上層</button>
				<button onclick="resetExplorer()">重置</button>
				<button onclick="download(currentPath)">下載當前項目</button>
			</div>
			<div class="path-row">
				<label for="path">路徑</label>
				<input id="path" type="text" onkeydown="onPathEnter(event)" onblur="read(this.value)"/>
			</div>
			<div id="breadcrumb" class="breadcrumb"></div>
		</div>
		
		<div class="content-card">
			<div id="list" class="panel">
				<p class="panel-title">檔案清單 (可拖放上傳)</p>
				<button onclick="create(currentPath, 'dir')"> + 新資料夾</button>
				<button onclick="create(currentPath, 'file')"> + 新文件</button>
				<ul id="drop" draggable="true"></ul>
			</div>
			<div id="view" class="panel">
				<p class="panel-title">預覽</p>
				<button onclick="edit(currentPath)">編輯</button>
				<iframe id="frame"></iframe>
			</div>
			<div id="edit" class="panel">
				<p class="panel-title">編輯器</p>
				<button onclick="save(currentPath)">儲存</button>
				<button onclick="read(currentPath)">取消</button>
				<textarea></textarea>
			</div>
		</div>
		</main>
		
		<form id="download" method="GET">
			<input name="path" type="hidden">
		</form>
		
		<template id="item">
			<li width="100%" path="replace with file path">
				<span>[文件名稱]</span>
				<button onclick="rename(this.parentNode.path, this.parentNode.type)">更名</button>
				<button onclick="remove(this.parentNode.path, this.parentNode.type)">刪除</button>
			</li>
		</template>
		
		<script>
			// global varable
			let currentPath = "/";
						
			// api
			let typeApi = 		"/manager/api/site/get_path_type.php" //?path
			let dirScanApi 	= 	"/manager/api/dir/scan_dir.php" //?dir
			let dirCreateApi = 	"/manager/api/dir/create_dir.php" //?dir
			let dirDeleteApi = 	"/manager/api/dir/delete_dir.php" //?path
			let dirRenameApi = 	"/manager/api/dir/rename_dir.php" //?path, name
			let dirDownloadApi = "/manager/api/dir/download_dir.php" //?path
			let fileScanApi = 	"/manager/api/file/scan_file.php" //?dir
			let fileReadApi = 	"/manager/api/file/read_file.php" //?path
			let fileWriteApi = 	"/manager/api/file/write_file.php" //?path, content
			let fileCreateApi = "/manager/api/file/create_file.php" //?dir
			let fileDeleteApi = "/manager/api/file/delete_file.php" //?path
			let fileRenameApi = "/manager/api/file/rename_file.php" //?path, name
			let fileDownloadApi = "/manager/api/file/download_file.php" //?path
			let fileUploadsApi = "/manager/api/file/upload_files.php" //?path
			const EXPLORER_PATH_COOKIE = 'manager_explorer_path_v1';

			function normalizePath(path){
				const raw = String(path ?? '').replace(/\\/g, '/');
				const parts = [];
				raw.split('/').forEach((seg) => {
					if (!seg || seg === '.') return;
					if (seg === '..') {
						if (parts.length > 0) parts.pop();
						return;
					}
					parts.push(seg);
				});
				return '/' + parts.join('/');
			}
			function joinPath(base, name){
				return normalizePath(`${base}/${name}`);
			}
			function escapeHtml(text){
				return String(text)
					.replaceAll('&', '&amp;')
					.replaceAll('<', '&lt;')
					.replaceAll('>', '&gt;')
					.replaceAll('"', '&quot;')
					.replaceAll("'", '&#39;');
			}
			function setCookie(name, value, days = 30){
				const d = new Date();
				d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
				document.cookie = `${name}=${encodeURIComponent(value)}; expires=${d.toUTCString()}; path=/; SameSite=Lax`;
			}
			function deleteCookie(name){
				document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; SameSite=Lax`;
			}
			function getCookie(name){
				const key = `${name}=`;
				const arr = document.cookie.split(';');
				for (const raw of arr){
					const c = raw.trim();
					if (c.startsWith(key)) return decodeURIComponent(c.substring(key.length));
				}
				return '';
			}
			function saveCurrentPath(path){
				setCookie(EXPLORER_PATH_COOKIE, normalizePath(path));
			}
			function getStartupPath(){
				const saved = getCookie(EXPLORER_PATH_COOKIE);
				return saved ? normalizePath(saved) : '/';
			}
			function resetExplorer(){
				deleteCookie(EXPLORER_PATH_COOKIE);
				read('/');
			}
			
			function initialPath(){
				let filePath = window.location.pathname;
				let dirPath = filePath.substring(0, filePath.lastIndexOf('/'));
				return dirPath
			}
			function onPathEnter(event){
				if(event.key === 'Enter'){
					read(event.target.value);
				}
			}
			function renderBreadcrumb(path){
				const dom = $('#breadcrumb');
				dom.empty();
				const segs = normalizePath(path).split('/').filter(Boolean);
				const rootBtn = $('<button type="button">/</button>');
				rootBtn.on('click', () => read('/'));
				dom.append(rootBtn);
				let acc = '';
				segs.forEach((seg) => {
					acc += '/' + seg;
					const btn = $(`<button type="button">${seg}</button>`);
					const target = acc;
					btn.on('click', () => read(target));
					dom.append(btn);
				});
			}

			function initialDrop(){
				let dropDom = $('#drop')
				dropDom.on("dragover", e => {
					e.preventDefault();
					dropDom.addClass('cover')
				});
				dropDom.on("dragleave", e => {
					e.preventDefault();
					e.preventDefault();
					dropDom.removeClass('cover')
				});
				dropDom.on("drop", e => {
					e.preventDefault();
					e.preventDefault();
					dropDom.removeClass('cover')
					drop(e.originalEvent.dataTransfer.items)
				});
			}
			
			function pathBack(path){
				splits = path.split('/')
				if(splits.length > 1){
					splits.pop()
					path = splits.join('/')
					read(path)
				}
			}
			
			function extractEmpty(path){
				tokens = path.split('/')
				buffer = tokens.pop()
				
				tokens = tokens.filter(t => t != '')
				tokens.push(buffer)
				
				return tokens.join('/')
			}
			
			function extractDotDot(path){
				buffer = []
				tokens = path.split('/')
				tokens.forEach(token => {
					if(token == '..' && buffer.length > 0 && buffer[buffer.length-1] != '..'){
						buffer.pop()
					}else{
						buffer.push(token)
					}
				})
				return buffer.join('/')
			}
			function alwaysHaveRoot(path){
				return path[0] == "/" 
					? path 
					: '/'+path
			}
			
			async function read(path){
				let pathDom = $('#path')
				let listDom = $('#list')
				let viewDom = $('#view')
				let editDom = $('#edit')
				
				path = normalizePath(path)
				currentPath = path
				saveCurrentPath(path)
				pathDom.val(path)
				renderBreadcrumb(path)
				console.log(path)
				
				let type = await $.post(typeApi, {path: path})
				switch(type){
					case 'dir':
						readDir(path)
						listDom.show()
						viewDom.hide()
						editDom.hide()
						break;
					case 'file':
						readFile(path)
						viewDom.show()
						listDom.hide()
						editDom.hide()
						break;
				}
			}
			
			function readDir(path){
				let listDom = $('#list').find('ul')
				let itemTemplate = $('#item')
				
				$.when(
					$.post(dirScanApi, {path: path}),
					$.post(fileScanApi, {path: path}),
				).done((resA, resB) => {
					let dirs = []
					let files = []
					try { dirs = Array.isArray(resA[0]) ? resA[0] : JSON.parse(resA[0] || '[]') } catch (e) { console.error('dir json parse fail', resA[0], e) }
					try { files = Array.isArray(resB[0]) ? resB[0] : JSON.parse(resB[0] || '[]') } catch (e) { console.error('file json parse fail', resB[0], e) }
					
					// clear
					listDom.empty()
					
					// append dirs
					dirs.forEach(dir => {
						let item = $(itemTemplate.html())
						item[0].path = joinPath(path, dir)
						item[0].type = 'dir'
						item.find('span').text(dir)
						item.find('span').addClass('item-name dir')
						item.find('span').dblclick(() => {
							read(joinPath(path, dir));
						})
						listDom.append(item)
					})
					
					// append files
					files.forEach(file => {
						let item = $(itemTemplate.html())
						item[0].path = joinPath(path, file)
						item[0].type = 'file'
						item.find('span').text(file)
						item.find('span').addClass('item-name file')
						item.find('span').dblclick(() => {
							read(joinPath(path, file));
						})
						listDom.append(item)
					})
				});
			}
			
			function readFile(path){
				let viewDom = $('#view').find('iframe')
				if (/\.md$/i.test(path)) {
					$.post(fileReadApi, { path: path })
						.done((res) => {
							const html = window.MarkdownPreview
								? window.MarkdownPreview.renderToHtml(res ?? '')
								: `<pre>${escapeHtml(res ?? '')}</pre>`;
							viewDom[0].srcdoc = `<!doctype html><html><head><meta charset="utf-8"><style>
								*{box-sizing:border-box}
								body{font-family:Segoe UI,Noto Sans TC,sans-serif;line-height:1.6;color:#1f2a37;padding:14px;margin:0}
								h1,h2,h3,h4,h5,h6{margin:0 0 10px;line-height:1.35}
								p{margin:0 0 10px}
								ul{margin:0 0 10px 0;padding-left:1.1em}
								li{margin:2px 0 0}
								pre{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px;overflow:auto}
								pre{margin:0 0 10px}
								code{background:#f1f5f9;border-radius:6px;padding:1px 5px}
								a{color:#1d4ed8}
							</style></head><body>${html}</body></html>`;
						})
						.fail((xhr) => {
							const msg = escapeHtml(xhr?.responseText || `${xhr.status} ${xhr.statusText}`);
							viewDom[0].srcdoc = `<pre style="color:#b91c1c;padding:12px">read failed: ${msg}</pre>`;
						});
					return;
				}
				viewDom.attr('srcdoc', '');
				viewDom.attr('src', path);
			}
			
			function edit(path){
				let listDom = $('#list')
				let viewDom = $('#view')
				let editDom = $('#edit')
				let codeDom = $('#edit').find('textarea')
				
				$.post(fileReadApi, {
					path: path
				}).done(() => {
					editDom.show()
					viewDom.hide()
					listDom.hide()
				}).done(res => {
					codeDom.val(res)
				})
			}
			
			function save(path){
				let editDom = $('#edit')
				
				if (!confirm(`確定要修改 "${path}" 的內容?`))
					return;
				
				content = editDom.find('textarea').val()
				
				$.post(fileWriteApi, {
					path: path, 
					content: content
				}).done(res => {
					read(currentPath)
				})
			}
			
			function create(path, type){
				if (!confirm(`確定要在 "${path}" 下新增?`))
					return;
				
				switch(type){
					case 'dir':
						$.post(dirCreateApi, {dir: path})
						 .done(() => read(currentPath) )
						break;
					case 'file':
						$.post(fileCreateApi, {dir: path})
						 .done(() => read(currentPath) )
						break;
				}
			}
			
			function rename(path, type){
				let name = prompt(`要將 "${path}" 取名為什麼名子?`)
				if (!name) return;
				
				switch(type){
					case 'dir':
						$.post(dirRenameApi, {path: path, name: name})
						 .done(() => read(currentPath) )
						break;
					case 'file':
						$.post(fileRenameApi, {path: path, name: name})
						 .done(() => read(currentPath) )
						break;
				}
			}
			
			function remove(path, type){
				let agree = confirm(`確定要刪除 "${path}" 嗎?`)
				if (!agree) return;
				
				switch(type){
					case 'dir':
						$.post(dirDeleteApi, {path: path})
						 .done(() => read(currentPath) )
						break;
					case 'file':
						$.post(fileDeleteApi, {path: path})
						 .done(() => read(currentPath) )
				}
			}
			
			async function download(path){
				let formDom = $('#download')
				let pathDom = formDom.find('input')
				
				let type = await $.post(typeApi, {path: path})
				switch(type){
					case 'dir':
						pathDom.val(path)
						formDom.attr('action', dirDownloadApi)
						formDom.submit()
						break;
					case 'file':
						pathDom.val(path)
						formDom.attr('action', fileDownloadApi)
						formDom.submit()
						break;
				}
			}
			
			async function drop(items){
				let agree = confirm(`確定要上傳檔案嗎?`)
				if (!agree) return;
				
				let entries = [];
				for (let i = 0; i < items.length; i++) {
					item = items[i]
					entry = item.webkitGetAsEntry()
					entries.push(entry)
				}
				
				let result = await getFiles(entries, currentPath)
				let files = result.files
				let dirs = result.dirs
				
				let formData = new FormData()
				files.forEach(file => formData.append('files[]', file))
				dirs.forEach(path => formData.append('dirs[]', path))
				
				$.ajax({
					type: 'POST',
					url: fileUploadsApi,
					data: formData,
					processData: false,
					contentType: false,
				}).done(res => {
					console.log(res);
					read(currentPath)
				})
			}
						
			async function getFiles(entries, dir = "") {
				let files = []
				let dirs = []
				for (let i = 0; i < entries.length; i++){
					entry = entries[i];
					if (entry.isFile) {
						await new Promise((resolve, reject) => {
							entry.file(file => {
								files.push(file)
								dirs.push(dir)
								resolve()
							})
						})
					} else if (entry.isDirectory) {
						await new Promise((resolve, reject) => {
							entry.createReader().readEntries(async (entries) => {
								result = await getFiles(entries, `${dir}/${entry.name}`)
								files = files.concat(result.files)
								dirs = dirs.concat(result.dirs)
								resolve()
							})
						})
					}
				}
				
				
				return {
					files: files,
					dirs: dirs,
				}
			}
			
		</script>
	</body>
</html>
