<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>API Test Workspace</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      background: #f6f8fb;
      color: #1f2a37;
    }
    .wrap {
      width: min(980px, 94%);
      margin: 28px auto;
    }
    .panel {
      background: #fff;
      border: 1px solid #dbe3f2;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
    }
    h1, h2 {
      margin: 0 0 10px;
    }
    .hint {
      color: #5b6b82;
      margin: 0;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <h1>API Test Workspace</h1>
      <p class="hint">這裡是 API 測試頁面骨架，尚未加入任何測試腳本。</p>
    </section>

    <section class="panel" id="dir-test">
      <h2>Directory API Tests</h2>
      <p class="hint">預留：`scan_dir`、`create_dir`、`rename_dir`、`delete_dir`、`download_dir`。</p>
    </section>

    <section class="panel" id="file-test">
      <h2>File API Tests</h2>
      <p class="hint">預留：`scan_file`、`read_file`、`write_file`、`create_file`、`rename_file`、`delete_file`、`download_file`、`upload_files`。</p>
    </section>
  </main>
</body>
</html>
