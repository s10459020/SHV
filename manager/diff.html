<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Diff</title>
  <script src="https://code.jquery.com/jquery.min.js"></script>
  <script src="/manager/js/api.js"></script>
  <style>
    :root{--bg:#f2f5fb;--card:#fff;--line:#d7e2f3;--text:#1f2a37;--muted:#58657a;--red:#ffd8d8;--yellow:#fff2bf;--green:#d9f8dc}
    *{box-sizing:border-box}
    body{margin:0;font-family:"Segoe UI","Noto Sans TC",sans-serif;background:var(--bg);color:var(--text)}
    .top-nav{position:sticky;top:0;z-index:1000;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:12px 14px}
    .home-banner{display:block;padding:12px 14px;border-radius:10px;border:1px solid var(--line);background:linear-gradient(135deg,#eef5ff,#f8fbff);color:var(--text);font-size:30px;text-decoration:none;font-weight:600}
    .wrap{width:min(1200px,94%);margin:18px auto 24px}
    .toolbar,.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:12px}
    .toolbar-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .path{font-family:ui-monospace,Consolas,monospace;color:#234}
    .legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .tag{padding:5px 8px;border-radius:8px;border:1px solid var(--line);font-size:12px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .list-box{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff;min-height:440px}
    .list-head{padding:10px 12px;border-bottom:1px solid var(--line);font-weight:700;display:flex;align-items:center;justify-content:space-between;gap:8px}
    .head-actions{display:flex;gap:8px}
    .items{padding:8px 10px}
    .left-box .items{max-height:none;overflow:visible}
    .right-box .items{max-height:none;min-height:420px;border:2px dashed #b8cae8;border-radius:10px;margin:10px 12px;background:#f8fbff}
    .right-box.drag .items{border-color:#1d4ed8;background:#eaf2ff}
    .drop-hint{height:100%;min-height:390px;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted);padding:12px}
    .item{padding:7px 9px;border-radius:8px;border:1px solid transparent;margin-bottom:6px;font-family:ui-monospace,Consolas,monospace;font-size:13px;display:flex;justify-content:space-between;gap:10px}
    .file-chip{display:inline-block;padding:3px 6px;border-radius:6px;cursor:pointer}
    .file-chip:hover{background:#eef5ff}
    .meta{color:#58657a;font-family:"Segoe UI","Noto Sans TC",sans-serif;font-size:12px;white-space:nowrap}
    .mark-remove{background:var(--red)} .mark-update{background:var(--yellow)} .mark-add{background:var(--green)} .muted{color:var(--muted)}
    @media (max-width: 900px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="top-nav"><a class="home-banner" href="/manager/index.html">Diff</a></div>
  <main class="wrap">
    <section class="toolbar">
      <div class="toolbar-row">
        <button id="btnBack">回 Explorer</button>
        <button id="btnReload">重新整理當前資料夾</button>
        <span class="muted">Current:</span>
        <span id="basePath" class="path"></span>
      </div>
      <div class="legend">
        <span class="tag" style="background:#ffd8d8">檔案移除(紅)</span>
        <span class="tag" style="background:#fff2bf">檔案更新(黃)</span>
        <span class="tag" style="background:#d9f8dc">檔案新增(綠)</span>
      </div>
    </section>

    <section class="grid">
      <article class="panel list-box left-box">
        <div class="list-head">
          <span>當前資料夾檔案列表</span>
          <span class="head-actions"><button id="btnDownload">下載</button></span>
        </div>
        <div id="leftItems" class="items"></div>
      </article>
      <article class="panel list-box right-box" id="rightPanel">
        <div class="list-head">
          <span>拖曳來源檔案列表</span>
          <span class="head-actions"><button id="btnUpload">上傳</button></span>
        </div>
        <div id="rightItems" class="items"></div>
      </article>
    </section>
  </main>
  <form id="downloadForm" method="GET" action="" target="_blank" style="display:none;">
    <input type="hidden" name="base" id="downloadBase">
    <input type="hidden" name="file_paths" id="downloadFiles">
  </form>

  <script>
    const qs = new URLSearchParams(location.search);
    const basePath = decodeURIComponent(qs.get('base') || '/');
    const restore = String(qs.get('restore') || '') === '1';
    const fresh = String(qs.get('fresh') || '') === '1';
    const baseFolderName = (() => {
      const n = String(basePath || '').replace(/\\/g, '/').replace(/\/+$/, '');
      const segs = n.split('/').filter(Boolean);
      return segs.length ? segs[segs.length - 1] : '';
    })();

    let apiList = '';
    let apiUpload = '';
    let apiDelete = '';
    const MTIME_TOLERANCE_MS = 2000;

    function applyApiEndpoints() {
      const base = ManagerApi.getBase();
      apiList = `${base}/dir/scan_all_file.php`;
      apiUpload = `${base}/file/upload_files.php`;
      apiDelete = `${base}/file/delete_file.php`;
      $('#downloadForm').attr('action', `${base}/dir/download_files.php`);
    }

    let leftFiles = [];
    let rightFiles = [];
    const DIFF_STATE_COOKIE = 'manager_diff_state_v1';

    const normalizeRel = (p) => String(p || '').replace(/\\/g, '/').replace(/^\/+/, '').replace(/\/+/g, '/');
    const fmtTime = (ts) => ts ? new Date(ts).toLocaleString() : '';
    const withBaseFolder = (rel) => {
      const r = normalizeRel(rel);
      if (!baseFolderName) return r;
      if (!r) return baseFolderName;
      if (r === baseFolderName || r.startsWith(baseFolderName + '/')) return r;
      return `${baseFolderName}/${r}`;
    };
    const stripBasePrefix = (path) => {
      const p = normalizeRel(path);
      if (!baseFolderName) return p;
      if (p === baseFolderName) return '';
      if (p.startsWith(baseFolderName + '/')) return p.slice(baseFolderName.length + 1);
      return p;
    };
    const relDir = (path) => {
      const p = normalizeRel(path);
      const i = p.lastIndexOf('/');
      return i >= 0 ? p.slice(0, i) : '';
    };
    const relBase = (path) => {
      const p = normalizeRel(path);
      const i = p.lastIndexOf('/');
      return i >= 0 ? p.slice(i + 1) : p;
    };
    function setCookie(name, value, days = 1){
      const d = new Date();
      d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
      document.cookie = `${name}=${encodeURIComponent(value)}; expires=${d.toUTCString()}; path=/; SameSite=Lax`;
    }
    function getCookie(name){
      const key = `${name}=`;
      const arr = document.cookie.split(';');
      for (const raw of arr){
        const c = raw.trim();
        if (c.startsWith(key)) return decodeURIComponent(c.substring(key.length));
      }
      return '';
    }
    function saveDiffState(){
      // cookie only stores metadata; file objects remain only in-memory
      const payload = {
        base: basePath,
        right: rightFiles.map(r => ({ path: r.path, mtimeMs: r.mtimeMs }))
      };
      const txt = JSON.stringify(payload);
      if (txt.length <= 3500) setCookie(DIFF_STATE_COOKIE, txt, 1);
    }
    function clearDiffState(){
      document.cookie = `${DIFF_STATE_COOKIE}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; SameSite=Lax`;
    }
    function loadDiffState(){
      const txt = getCookie(DIFF_STATE_COOKIE);
      if (!txt) return;
      try{
        const data = JSON.parse(txt);
        if (data?.base !== basePath || !Array.isArray(data?.right)) return;
        rightFiles = data.right
          .filter(x => x && typeof x.path === 'string')
          .map(x => ({ path: normalizeRel(x.path), mtimeMs: Number(x.mtimeMs || 0) }));
      }catch(_){}
    }
    function openPreviewFromDiff(absPath){
      const u = `/manager/preview.html?path=${encodeURIComponent(absPath)}&from=diff&base=${encodeURIComponent(basePath)}&restore=1`;
      location.href = u;
    }
    function openPreviewBlob(fileObj){
      const blobUrl = URL.createObjectURL(fileObj);
      const name = fileObj?.name || 'local-file';
      const u = `/manager/preview.html?blob=${encodeURIComponent(blobUrl)}&name=${encodeURIComponent(name)}&from=diff&base=${encodeURIComponent(basePath)}&restore=1`;
      location.href = u;
    }

    function classify(path) {
      const l = leftFiles.find(x => x.path === path);
      const r = rightFiles.find(x => x.path === path);
      if (l && !r) return { left: 'mark-remove', right: '' };
      if (!l && r) return { left: '', right: 'mark-add' };
      if (!l || !r) return { left: '', right: '' };
      const diff = l.mtimeMs - r.mtimeMs;
      if (Math.abs(diff) <= MTIME_TOLERANCE_MS) return { left: '', right: '' };
      return diff > 0 ? { left: 'mark-update', right: '' } : { left: '', right: 'mark-update' };
    }

    function diffState(path) {
      const l = leftFiles.find(x => x.path === path);
      const r = rightFiles.find(x => x.path === path);
      if (l && !r) return 'remove';
      if (!l && r) return 'add';
      if (!l || !r) return 'same';
      const diff = l.mtimeMs - r.mtimeMs;
      if (Math.abs(diff) <= MTIME_TOLERANCE_MS) return 'same';
      return diff > 0 ? 'left_newer' : 'right_newer';
    }

    function getDiffRows() {
      const union = new Set([...leftFiles.map(x => x.path), ...rightFiles.map(x => x.path)]);
      return [...union].sort((a,b) => a.localeCompare(b)).map((p) => ({
        path: p,
        left: leftFiles.find(x => x.path === p) || null,
        right: rightFiles.find(x => x.path === p) || null,
        state: diffState(p),
      }));
    }

    function render() {
      const leftDom = $('#leftItems');
      const rightDom = $('#rightItems');
      leftDom.empty();
      rightDom.empty();

      if (rightFiles.length === 0) {
        leftFiles.forEach(f => leftDom.append(`<div class="item"><span class="file-chip pv-link-left" data-rel="${encodeURIComponent(f.path)}">${f.path}</span><span class="meta">${fmtTime(f.mtimeMs)}</span></div>`));
        rightDom.append('<div class="drop-hint">把檔案/資料夾拖到這個區塊（只讀取資訊，不上傳）</div>');
        return;
      }

      const rows = getDiffRows();
      rows.forEach((row) => {
        const c = classify(row.path);
        if (row.left) leftDom.append(`<div class="item ${c.left}"><span class="file-chip pv-link-left" data-rel="${encodeURIComponent(row.left.path)}">${row.left.path}</span><span class="meta">${fmtTime(row.left.mtimeMs)}</span></div>`);
        if (row.right) rightDom.append(`<div class="item ${c.right}"><span class="file-chip pv-link-right" data-rel="${encodeURIComponent(row.right.path)}">${row.right.path}</span><span class="meta">${fmtTime(row.right.mtimeMs)}</span></div>`);
      });
    }

    async function loadLeft() {
      $('#basePath').text(basePath);
      const text = await $.post(apiList, { path: basePath });
      const rows = Array.isArray(text) ? text : JSON.parse(text || '[]');
      leftFiles = rows.map(r => ({ path: withBaseFolder(r.path), mtimeMs: Math.floor(Number(r.mtime || 0)) * 1000 }))
        .sort((a,b)=>a.path.localeCompare(b.path));
      render();
    }

    async function readAllDirectoryEntries(reader) {
      let out = [];
      while (true) {
        const batch = await new Promise((resolve) => reader.readEntries(resolve));
        if (!batch || batch.length === 0) break;
        out = out.concat(batch);
      }
      return out;
    }

    async function collectFromEntry(entry, prefix = '') {
      let out = [];
      if (entry.isFile) {
        const file = await new Promise((resolve) => entry.file(resolve));
        out.push({ path: normalizeRel(prefix ? `${prefix}/${file.name}` : file.name), mtimeMs: Math.floor(Number(file.lastModified || 0) / 1000) * 1000, file });
        return out;
      }
      if (entry.isDirectory) {
        const next = prefix ? `${prefix}/${entry.name}` : entry.name;
        const reader = entry.createReader();
        const children = await readAllDirectoryEntries(reader);
        for (const c of children) out = out.concat(await collectFromEntry(c, next));
      }
      return out;
    }

    async function collectDropped(dataTransfer) {
      const items = dataTransfer?.items || [];
      let rows = [];
      const entries = [];
      for (let i = 0; i < items.length; i++) {
        const e = items[i].webkitGetAsEntry ? items[i].webkitGetAsEntry() : null;
        if (e) entries.push(e);
      }
      if (entries.length) {
        for (const e of entries) rows = rows.concat(await collectFromEntry(e, ''));
      } else {
        const files = Array.from(dataTransfer?.files || []);
        rows = files.map(f => ({ path: normalizeRel(f.name), mtimeMs: Math.floor(Number(f.lastModified || 0) / 1000) * 1000, file: f }));
      }
      const dedup = new Map();
      rows.forEach(r => dedup.set(r.path, r));
      return [...dedup.values()].sort((a,b)=>a.path.localeCompare(b.path));
    }

    async function handleDropEvent(e) {
      e.preventDefault();
      e.stopPropagation();
      $('#rightPanel').removeClass('drag');
      rightFiles = await collectDropped(e.originalEvent.dataTransfer);
      saveDiffState();
      render();
    }

    function initDrop() {
      const panel = $('#rightPanel');
      panel.on('dragover', (e) => { e.preventDefault(); panel.addClass('drag'); });
      panel.on('dragleave', (e) => { e.preventDefault(); panel.removeClass('drag'); });
      panel.on('drop', handleDropEvent);
    }

    async function postText(url, data) {
      const fd = new FormData();
      Object.entries(data || {}).forEach(([k, v]) => fd.append(k, String(v)));
      const res = await fetch(url, { method: 'POST', body: fd });
      const txt = await res.text();
      if (!res.ok) throw new Error(txt || `${res.status} ${res.statusText}`);
      return txt;
    }

    async function runUploadApply() {
      if (rightFiles.length === 0) {
        alert('請先拖曳來源檔案');
        return;
      }
      const rows = getDiffRows();
      const toUpload = rows.filter(r => r.state === 'add' || r.state === 'right_newer');
      const toDelete = rows.filter(r => r.state === 'remove');
      const missingSource = toUpload.filter(r => !r.right?.file);
      if (missingSource.length > 0) {
        throw new Error('缺少可上傳的來源檔案內容，請重新拖曳來源後再上傳');
      }

      const fd = new FormData();
      let uploadCount = 0;
      for (const r of toUpload) {
        if (!r.right?.file) continue;
        const rel = stripBasePrefix(r.path);
        if (!rel) continue;
        const dir = relDir(rel);
        const targetDir = dir ? `${basePath}/${dir}` : basePath;
        fd.append('files[]', r.right.file, relBase(rel));
        fd.append('dirs[]', targetDir);
        fd.append('mtimes[]', String(r.right.mtimeMs || 0));
        uploadCount++;
      }

      if (uploadCount > 0) {
        const res = await fetch(apiUpload, { method: 'POST', body: fd });
        const text = await res.text();
        if (!res.ok) throw new Error(text || 'upload failed');
        let payload = {};
        try { payload = JSON.parse(text || '{}'); } catch (_) {}
        if ((payload.saved || 0) < uploadCount) {
          const msg = Array.isArray(payload.errors) && payload.errors.length
            ? payload.errors.map(e => `${e.name || '#'+e.index}: ${e.error}`).join('\n')
            : '部分檔案未上傳成功';
          throw new Error(msg);
        }
      }

      for (const r of toDelete) {
        const rel = stripBasePrefix(r.path);
        if (!rel) continue;
        try {
          await postText(apiDelete, { path: `${basePath}/${rel}` });
        } catch (e) {
          const msg = String(e?.message || e || '');
          // If file is already gone, treat as already deleted.
          if (msg.includes('is not a file') || msg.includes('404')) continue;
          throw e;
        }
      }

      await loadLeft();
      saveDiffState();
      alert(`上傳套用完成：上傳 ${uploadCount} 筆，刪除 ${toDelete.length} 筆`);
    }

    async function runDownloadExport() {
      await loadLeft();
      const rows = getDiffRows();
      const files = rows
        .filter(r => r.state === 'left_newer' || r.state === 'remove')
        .map(r => stripBasePrefix(r.path))
        .filter(Boolean);
      if (files.length === 0) {
        alert('沒有可下載的差異檔案');
        return;
      }
      $('#downloadBase').val(basePath);
      $('#downloadFiles').val(JSON.stringify(files));
      $('#downloadForm')[0].submit();
    }

    $('#btnBack').on('click', () => { location.href = `/manager/explorer.html?path=${encodeURIComponent(basePath)}`; });
    $('#btnReload').on('click', () => loadLeft().catch(err => alert('load fail: ' + err)));
    $('#btnUpload').on('click', () => runUploadApply().catch(err => alert('上傳套用失敗: ' + (err?.message || err))));
    $('#btnDownload').on('click', () => {
      runDownloadExport().catch(err => alert('下載輸出失敗: ' + (err?.message || err)));
    });
    $('#leftItems').on('click', '.pv-link-left', (e) => {
      e.preventDefault();
      const rel = decodeURIComponent(String($(e.currentTarget).attr('data-rel') || ''));
      const sub = stripBasePrefix(rel);
      const abs = sub ? `${basePath}/${sub}` : basePath;
      openPreviewFromDiff(abs);
    });
    $('#rightItems').on('click', '.pv-link-right', (e) => {
      e.preventDefault();
      const rel = decodeURIComponent(String($(e.currentTarget).attr('data-rel') || ''));
      const item = rightFiles.find(x => x.path === rel);
      if (item?.file) {
        openPreviewBlob(item.file);
        return;
      }
      const sub = stripBasePrefix(rel);
      const abs = sub ? `${basePath}/${sub}` : basePath;
      openPreviewFromDiff(abs);
    });

    async function boot() {
      await ManagerApi.ready();
      applyApiEndpoints();
      initDrop();
      if (fresh) {
        clearDiffState();
        const nqs = new URLSearchParams(location.search);
        nqs.delete('fresh');
        const next = location.pathname + (nqs.toString() ? ('?' + nqs.toString()) : '');
        history.replaceState(null, '', next);
      }
      if (restore || !fresh) loadDiffState();
      loadLeft().catch(err => { $('#leftItems').html(`<div class="muted">load fail: ${String(err)}</div>`); });
    }
    boot();
  </script>
</body>
</html>
